{% extends "base.html" %}
{% block title %}Add Member — Yuvraj Library{% endblock %}
{% block content %}
<h2>Add New Member</h2>
<form method="post" class="mt-3" style="max-width: 600px;">
    <div class="mb-3">
        <label class="form-label">Full Name *</label>
        <div class="form-hint">सदस्य का नाम</div>
        <input type="text" name="name" class="form-control" value="{{ form.get('name', '') }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Phone Number *</label>
        <div class="form-hint">फोन नंबर</div>
        <input type="text" name="phone" class="form-control" value="{{ form.get('phone', '') }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Address *</label>
        <div class="form-hint">पता</div>
        <textarea name="address" class="form-control" rows="2" required>{{ form.get('address', '') }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Government ID Type *</label>
        <div class="form-hint">सरकारी पहचान पत्र</div>
        <select name="id_type" class="form-select">
            {% for opt in ['Aadhaar', 'Voter ID', 'PAN', 'Passport', 'Other'] %}
            <option value="{{ opt }}" {% if form.get('id_type') == opt %}selected{% endif %}>{{ opt }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">ID Number *</label>
        <input type="text" name="id_number" class="form-control" value="{{ form.get('id_number', '') }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Member Type</label>
        <select name="member_type" class="form-select">
            {% for opt in ['General', 'Student', 'Professional', 'Senior Citizen'] %}
            <option value="{{ opt }}" {% if form.get('member_type', 'General') == opt %}selected{% endif %}>{{ opt }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Notes (optional)</label>
        <textarea name="notes" class="form-control" rows="2">{{ form.get('notes', '') }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save Member</button>
    <a href="/members" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock %}
